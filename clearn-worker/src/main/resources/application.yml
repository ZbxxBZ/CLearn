spring:
  application:
    name: clearn-worker
  rabbitmq:
    host: ${CLEARN_WORKER_RABBITMQ_HOST:localhost}
    port: ${CLEARN_WORKER_RABBITMQ_PORT:5672}
    username: ${CLEARN_WORKER_RABBITMQ_USERNAME:guest}
    password: ${CLEARN_WORKER_RABBITMQ_PASSWORD:guest}
  datasource:
    url: ${CLEARN_WORKER_DATASOURCE_URL:jdbc:mysql://localhost:3306/clearn?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${CLEARN_WORKER_DATASOURCE_USERNAME:clearn}
    password: ${CLEARN_WORKER_DATASOURCE_PASSWORD:clearn}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: ${CLEARN_WORKER_SERVER_PORT:8081}

clearn:
  worker:
    internal-api:
      base-url: ${CLEARN_WORKER_INTERNAL_API_BASE_URL:http://localhost:8080}
      token: ${CLEARN_WORKER_INTERNAL_API_TOKEN:dev-internal-token}
