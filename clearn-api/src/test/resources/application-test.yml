spring:
  datasource:
    url: jdbc:h2:mem:clearn_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/testdata
  sql:
    init:
      mode: never

clearn:
  security:
    token-secret: test-token-secret-for-clearn-auth-tests
    token-ttl: PT2H
    internal-token: test-internal-token
  submission:
    max-source-bytes: 65536
    rate-limit:
      enabled: false
